<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Co-op Battle Monsters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
      
      body {
        font-family: 'Press Start 2P', cursive;
        background-color: #0f172a;
        color: white;
        overflow-x: hidden; /* Prevent horizontal scrollbars from animations */
      }
      
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }

      .pixel-art {
        image-rendering: pixelated;
      }

      /* --- Animations --- */
      @keyframes shake {
        0% { transform: translate(0, 0); }
        25% { transform: translate(-8px, 0); }
        50% { transform: translate(8px, 0); }
        75% { transform: translate(-8px, 0); }
        100% { transform: translate(0, 0); }
      }
      @keyframes attack-l-to-r {
        0% { transform: translateX(0); }
        40% { transform: translateX(80px); }
        100% { transform: translateX(0); }
      }
      @keyframes attack-r-to-l {
        0% { transform: translateX(0); }
        40% { transform: translateX(-80px); }
        100% { transform: translateX(0); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 255, 0, 0.5)); }
        50% { filter: drop-shadow(0 0 15px rgba(255, 255, 0, 1)); }
      }
      
      /* New Combo FX */
      @keyframes combo-blast {
        0% { transform: scale(0.1); opacity: 1; filter: hue-rotate(0deg); }
        50% { transform: scale(1.5); opacity: 0.8; filter: hue-rotate(180deg); }
        100% { transform: scale(2); opacity: 0; filter: hue-rotate(360deg); }
      }

      .animate-shake { animation: shake 0.4s ease-in-out; }
      .animate-attack-right { animation: attack-l-to-r 0.4s ease-in-out; }
      .animate-attack-left { animation: attack-r-to-l 0.4s ease-in-out; }
      .animate-float { animation: float 3.5s ease-in-out infinite; }
      .animate-target-pulse { animation: pulse-glow 1.5s infinite; cursor: pointer; }
      .animate-combo { animation: combo-blast 1s ease-out forwards; }

      /* Visual FX for Moves */
      @keyframes flash-red { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(255, 0, 0, 0.6); } }
      @keyframes flash-blue { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(0, 0, 255, 0.5); } }
      @keyframes flash-yellow { 0%, 100% { background-color: transparent; } 10%, 90% { background-color: rgba(255, 255, 0, 0.6); } 50% { background-color: transparent; } }
      @keyframes flash-green { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(0, 255, 0, 0.5); } }
      @keyframes flash-purple { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(128, 0, 128, 0.6); } }
      @keyframes flash-white { 0%, 100% { background-color: transparent; } 20% { background-color: rgba(255, 255, 255, 0.8); } 80% { background-color: rgba(255, 255, 255, 0.8); } }

      .effect-fire { animation: flash-red 0.5s ease-out; }
      .effect-water { animation: flash-blue 0.5s ease-out; }
      .effect-ice { animation: flash-blue 0.5s ease-out; }
      .effect-electric { animation: flash-yellow 0.3s ease-in-out infinite; }
      .effect-grass { animation: flash-green 0.8s ease-out; }
      .effect-poison { animation: flash-purple 0.8s ease-out; }
      .effect-psychic { animation: flash-purple 0.8s ease-in-out; }
      .effect-ghost { animation: flash-purple 0.8s ease-in-out; }
      .effect-normal { animation: flash-white 0.2s linear; }
      .effect-fighting { animation: flash-white 0.2s linear; }
      .effect-rock { animation: shake 0.5s ease-out, flash-white 0.2s; }
      .effect-ground { animation: shake 0.5s ease-out; }

      .hp-bar-transition {
        transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
      }
      
      .meter-bar-transition {
        transition: width 0.5s ease-out;
      }

      /* Stadium Background */
      .stadium-sky {
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 60%, #334155 100%);
        position: absolute;
        inset: 0;
        z-index: 0;
      }
      
      .stadium-floor {
        position: absolute;
        bottom: -20%;
        left: -10%;
        right: -10%;
        height: 60%;
        background: 
            radial-gradient(circle at 50% 0%, rgba(255,255,255,0.1) 0%, transparent 60%),
            repeating-linear-gradient(90deg, #14532d 0px, #14532d 100px, #166534 100px, #166534 200px);
        transform: perspective(1000px) rotateX(40deg);
        box-shadow: inset 0 20px 100px rgba(0,0,0,0.8);
        border-top: 4px solid #4ade80;
        z-index: 1;
        opacity: 0.9;
      }
      
      .spotlight {
        position: absolute;
        top: -10%;
        left: 20%;
        width: 100px;
        height: 800px;
        background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 80%);
        transform: rotate(20deg);
        pointer-events: none;
        z-index: 1;
      }
      .spotlight:nth-child(2) {
        left: 80%;
        transform: rotate(-20deg);
      }

    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
